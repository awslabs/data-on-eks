apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey-cluster.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
data:
  valkey.conf: |
    # ----- Cluster mode -----
    cluster-enabled yes
    cluster-config-file /data/nodes.conf
    cluster-node-timeout 15000
    cluster-require-full-coverage no
    cluster-allow-reads-when-down no
    cluster-preferred-endpoint-type hostname

    # ----- Networking -----
    bind 0.0.0.0
    port {{ .Values.ports.client }}
    cluster-port {{ .Values.ports.bus }}
    protected-mode no

    # ----- Logging -----
    loglevel {{ .Values.valkeyLogLevel }}

    {{- if .Values.auth.enabled }}
    # ----- ACL -----
    aclfile /data/conf/users.acl
    {{- end }}

    # ----- User-supplied valkeyConfig -----
    {{- with .Values.valkeyConfig }}
    {{- nindent 4 . }}
    {{- end }}
