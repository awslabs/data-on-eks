{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "valkey-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "valkey-cluster.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Cluster-internal: every pod talks to every other pod on client + bus.
    - from:
        - podSelector:
            matchLabels:
              {{- include "valkey-cluster.selectorLabels" . | nindent 14 }}
      ports:
        - { protocol: TCP, port: {{ .Values.ports.client }} }
        - { protocol: TCP, port: {{ .Values.ports.bus }} }
    {{- with .Values.networkPolicy.allowedFrom }}
    # Application namespaces — client port only.
    - from:
        {{- range . }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - { protocol: TCP, port: {{ $.Values.ports.client }} }
    {{- end }}
    {{- if .Values.metrics.enabled }}
    # Prometheus scrape (allow from any namespace; tighten via Prometheus
    # operator's pod selector if your stack supports it).
    - ports:
        - { protocol: TCP, port: {{ .Values.ports.metrics }} }
    {{- end }}
  egress:
    # Cluster-internal egress.
    - to:
        - podSelector:
            matchLabels:
              {{- include "valkey-cluster.selectorLabels" . | nindent 14 }}
      ports:
        - { protocol: TCP, port: {{ .Values.ports.client }} }
        - { protocol: TCP, port: {{ .Values.ports.bus }} }
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
