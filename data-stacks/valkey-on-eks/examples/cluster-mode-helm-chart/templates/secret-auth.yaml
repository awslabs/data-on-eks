{{/*
  Auto-generate an auth Secret when the user did not supply one.
  Note: re-running `helm upgrade` regenerates the password by default. To pin
  it, supply `auth.existingSecret` instead.
*/}}
{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey-cluster.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{ .Values.auth.existingSecretPasswordKey }}: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}
