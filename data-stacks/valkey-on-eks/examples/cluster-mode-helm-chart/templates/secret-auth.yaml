{{/*
  Auth Secret.

  Stable across helm upgrades: if a Secret with the chart's generated name
  already exists, the existing password is reused (via `lookup`). Only when
  no Secret exists yet do we mint a fresh 32-char password.

  Without this, `randAlphaNum` would regenerate the password on every
  `helm upgrade`, but running pods cache the env-var value at startup, and
  the on-disk `requirepass` derived from the prior env-var stops matching
  the new Secret. Replicas then hit `NOAUTH` and replication stalls.

  Users who want to manage the password themselves should set
  `auth.existingSecret` and `auth.existingSecretPasswordKey`; the chart
  will not render this Secret at all in that case.
*/}}
{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
{{- $secretName := include "valkey-cluster.secretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $passwordB64 := "" }}
{{- if $existing }}
{{- $passwordB64 = index $existing.data .Values.auth.existingSecretPasswordKey }}
{{- else }}
{{- $passwordB64 = randAlphaNum 32 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{ .Values.auth.existingSecretPasswordKey }}: {{ $passwordB64 | quote }}
{{- end }}
