apiVersion: v1
kind: Service
metadata:
  name: {{ include "valkey-cluster.headlessServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  # publishNotReadyAddresses is essential during bootstrap: --cluster create
  # PINGs all 6 nodes before any of them can pass the consensus readiness
  # probe. Without this, CoreDNS suppresses A records for not-Ready pods and
  # the bootstrap stalls.
  publishNotReadyAddresses: true
  selector:
    {{- include "valkey-cluster.selectorLabels" . | nindent 4 }}
  ports:
    - name: tcp-client
      port: {{ .Values.ports.client }}
      targetPort: tcp-client
      protocol: TCP
    - name: tcp-bus
      port: {{ .Values.ports.bus }}
      targetPort: tcp-bus
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: http-metrics
      port: {{ .Values.ports.metrics }}
      targetPort: http-metrics
      protocol: TCP
    {{- end }}
