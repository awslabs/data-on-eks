# =============================================================================
# Valkey Cluster Mode — local chart values
#
# Deploys a Valkey cluster (sharded, gossip-based) as a single StatefulSet
# (podManagementPolicy: Parallel) plus a headless Service plus a post-install
# Helm Hook Job that runs `valkey-cli --cluster create`. No operator. No
# external chart dependency.
#
# Design notes:
#   - Auth uses `requirepass` + `primaryauth` (Valkey 8.0+ rename of
#     `masterauth`) sourced from a Kubernetes Secret. No ACL file. This
#     sidesteps the NOPERM/SYNC trap and keeps the single-password model.
#   - The Secret value is preserved across `helm upgrade` via a `lookup`
#     guard on the secret-auth template — re-running upgrade does NOT
#     rotate the password.
#   - Cluster bootstrap happens once, in a post-install Hook Job. The Job
#     is idempotent (no-ops if cluster_state:ok is already true).
#
# Pair this chart with the data-on-eks Valkey NodePool (label
# NodeGroupType=valkey, taint workload=valkey:NoSchedule) — see
# infra/terraform/manifests/karpenter/nodepool-valkey.yaml.
# =============================================================================

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  registry: docker.io
  repository: valkey/valkey
  pullPolicy: IfNotPresent
  # Empty = use Chart.appVersion
  tag: ""

imagePullSecrets: []

# -----------------------------------------------------------------------------
# Topology
#
# replicaCount = primaries × (1 + replicasPerPrimary)
# 6 = 3 × (1 + 1)  → 3 primaries, 1 replica each (default, recommended)
# 9 = 3 × (1 + 2)  → 3 primaries, 2 replicas each (read-heavy + extra HA)
# 8 = 4 × (1 + 1)  → 4 primaries, 1 replica each
#
# Minimum 6 — quorum requires 3+ primaries.
# -----------------------------------------------------------------------------
replicaCount: 6
replicasPerPrimary: 1

# -----------------------------------------------------------------------------
# Naming
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# StatefulSet
# -----------------------------------------------------------------------------
statefulset:
  # 30s is enough for the preStop hook (CLUSTER FAILOVER + SHUTDOWN ~5-10s).
  # Increase if you run with very large maxmemory and `shutdown save` semantics.
  terminationGracePeriodSeconds: 30

# -----------------------------------------------------------------------------
# Persistence — required for cluster mode. Without persistence, a pod restart
# loses its on-disk node ID and slot ownership; recovery requires manual
# intervention.
#
# Storage choice cheat-sheet (per-shard working set → StorageClass):
#   ≤ 32 GiB                  : `gp3` (default, 3000 IOPS / 125 MiB/s baseline)
#   ≤ 256 GiB                 : `valkey-gp3` (6000 IOPS / 500 MiB/s) — see
#                               data-stacks/valkey-on-eks/examples/
#                               storageclass-valkey-gp3.yaml
#   ≤ 1 TiB                   : custom gp3 StorageClass at 16000 IOPS /
#                               1000 MiB/s (the gp3 ceiling)
#   > 1 TiB OR p99-latency-   : io2 Block Express, or local NVMe instance store
#     sensitive                 with `local-storage` (replica resync is your
#                               only recovery path)
#
# Size the PVC at ~2× the per-shard working set: BGSAVE/AOF rewrite forks
# and produces a fresh on-disk copy while the previous one is still live.
# Default 100 GiB is fine for a 12 GiB shard.
# -----------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: gp3
  size: 100Gi
  accessModes:
    - ReadWriteOnce
  # Optional: set a VolumeAttributesClass to control IOPS and throughput for
  # new PVCs at provisioning time. Requires the VAC to exist in the cluster
  # and EBS CSI driver >= v1.35. Leave empty to use the StorageClass defaults.
  # Example: volumeAttributesClassName: valkey-gp3-perf
  volumeAttributesClassName: ""

# -----------------------------------------------------------------------------
# Service ports
# -----------------------------------------------------------------------------
ports:
  client: 6379
  bus: 16379
  metrics: 9121

# -----------------------------------------------------------------------------
# Authentication
#
# When auth.enabled = true and auth.existingSecret is empty, the chart
# generates a Secret named `<release>-auth` with a random 32-character
# password on FIRST install. Subsequent `helm upgrade` runs preserve the
# existing password (via `lookup`) — they do not rotate.
#
# To manage the password externally (recommended for production): create
# a Secret out-of-band with key `default`, then set
# `auth.existingSecret: my-secret-name`.
# -----------------------------------------------------------------------------
auth:
  enabled: true
  existingSecret: ""
  existingSecretPasswordKey: "default"

# -----------------------------------------------------------------------------
# Valkey configuration
#
# valkeyConfig is appended verbatim to the chart's valkey.conf. The chart adds
# the cluster-mode flags, persistence flags, and the include for /data/conf/
# auth.conf (requirepass + primaryauth) on top of whatever you put here.
# -----------------------------------------------------------------------------
valkeyConfig: |
  # Memory + eviction
  maxmemory 12gb
  maxmemory-policy noeviction

  # Persistence — both AOF and RDB for max durability.
  # For RDB-only (saves replication / network bandwidth at the cost of up to
  # 15 minutes of potential data loss on crash), comment out `appendonly yes`
  # and tighten the `save` cadence to match your RPO.
  appendonly yes
  appendfsync everysec
  auto-aof-rewrite-percentage 100
  auto-aof-rewrite-min-size 64mb
  save 900 1
  save 300 10
  save 60 10000

  # I/O threading (Valkey 7+). Parallelizes socket reads/writes/TLS while the
  # main command-execution loop stays single-threaded. Major win for multi-KB
  # values and high QPS. Recommended: io-threads = min(8, vCPU - 2).
  io-threads 4
  io-threads-do-reads yes

  # Diskless replication — sends the RDB to replicas over a socket without
  # writing it to the primary's disk first. Saves an EBS write burst during
  # PSYNC full-resync. Safe to enable when the network between pods is fast.
  repl-diskless-sync yes
  repl-diskless-sync-delay 5

  # Operational visibility
  slowlog-log-slower-than 10000
  latency-monitor-threshold 100

valkeyLogLevel: notice

# -----------------------------------------------------------------------------
# Resources
#
# Set requests.memory == limits.memory to avoid CoW OOM during BGSAVE.
# Target ~70-80% of node RAM. Defaults fit r7g.large / r7i.large (16 GiB).
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: "1000m"
    memory: "12Gi"
  limits:
    memory: "16Gi"

# -----------------------------------------------------------------------------
# Scheduling
#
# Defaults match the data-on-eks Valkey NodePool. Pods land on Graviton
# r7g/r8g (or x86 r7i) on-demand instances spread across AZs.
# -----------------------------------------------------------------------------
nodeSelector:
  NodeGroupType: valkey

tolerations:
  - key: workload
    operator: Equal
    value: valkey
    effect: NoSchedule

# Hard AZ spread by default — prevents two pods landing in the same AZ until
# the cluster has at least 3 AZs of capacity. Switch whenUnsatisfiable to
# ScheduleAnyway for dev/test in single-AZ clusters.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: valkey-cluster

# Soft pod anti-affinity at the host level — keeps pods on different nodes
# when capacity allows, without blocking scheduling when it doesn't. Override
# via `tuning.strictHostAntiAffinity: true` for strict one-pod-per-node.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: valkey-cluster

# -----------------------------------------------------------------------------
# Tuning knobs that flip multiple lower-level settings at once.
#
# networkOptimized:
#   When true, pin pods to the n-suffix Graviton families (r7gn/r8gn/m7gn)
#   for sustained > 10 Gbps client traffic, multi-KB values, or PSYNC full-
#   resync of large shards. Implemented as a hard nodeAffinity on
#   karpenter.k8s.aws/instance-family. Default false — typical workloads
#   should not pay the n-suffix cost premium.
#
# strictHostAntiAffinity:
#   When true, replaces the soft podAntiAffinity above with HARD
#   requiredDuringSchedulingIgnoredDuringExecution so two Valkey pods can
#   NEVER land on the same node — mitigates noisy-neighbor effects from
#   pod-to-pod CPU / NIC contention. Requires the Valkey NodePool to have
#   at least `replicaCount` nodes worth of capacity at all times.
# -----------------------------------------------------------------------------
tuning:
  networkOptimized: false
  strictHostAntiAffinity: false

# -----------------------------------------------------------------------------
# Kernel tuning (privileged init container)
#
# Disables Transparent Huge Pages and bumps net.core.somaxconn /
# vm.overcommit_memory. THP is the single most damaging default for Valkey
# in production — it causes ~500x write amplification during BGSAVE forks.
# Required by Valkey's startup warnings.
#
# Runs as root with `privileged: true` for ~1 second. If your namespace has
# a restricted PSA profile, you need an exception for this container OR
# disable kernelTuning and run a separate DaemonSet that applies the same
# settings at the node level.
# -----------------------------------------------------------------------------
kernelTuning:
  enabled: true

# -----------------------------------------------------------------------------
# PodDisruptionBudget — maxUnavailable: 1 matches the quorum tolerance of
# cluster mode (1 primary loss is tolerated; 2+ stalls failover).
# -----------------------------------------------------------------------------
pdb:
  enabled: true
  maxUnavailable: 1

# -----------------------------------------------------------------------------
# NetworkPolicy — default off because most users haven't configured the
# `allowedFrom` selectors for their app namespaces yet. Flip to true once
# you know who needs to reach 6379.
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: false
  # Application namespaces allowed to reach the cluster on port 6379.
  # Each entry is a namespaceSelector matchLabels block.
  allowedFrom: []
  #  - matchLabels:
  #      role: app

# -----------------------------------------------------------------------------
# ServiceAccount
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# Pod-level security
# -----------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false   # Valkey writes config + state to /data
  runAsNonRoot: true
  runAsUser: 1000

podAnnotations: {}
podLabels: {}

# -----------------------------------------------------------------------------
# Metrics — Prometheus exporter sidecar (oliver006/redis_exporter)
# -----------------------------------------------------------------------------
metrics:
  enabled: true
  image:
    registry: ghcr.io
    repository: oliver006/redis_exporter
    tag: v1.79.0
    pullPolicy: IfNotPresent
  resources: {}
  serviceMonitor:
    enabled: true
    namespace: ""        # default = release namespace
    interval: 30s
    additionalLabels: {}

# -----------------------------------------------------------------------------
# Bootstrap Hook Job tuning
# -----------------------------------------------------------------------------
bootstrap:
  # How long the bootstrap Job waits for ALL pods to PING before bailing.
  # Increase if your cluster pulls images slowly or schedules on cold nodes.
  waitTimeoutSeconds: 300

# -----------------------------------------------------------------------------
# Topology / AZ-aware bootstrap
#
# When azAwareBootstrap is true, the post-install Hook Job runs an init
# container with kubectl that discovers each pod's AZ (via the
# topology.kubernetes.io/zone node label) and writes a topology file. The
# main bootstrap container then issues explicit --cluster create + per-replica
# --cluster add-node --cluster-slave calls so each replica is paired with a
# primary in a DIFFERENT AZ — the cluster survives any single-AZ outage.
#
# Without this, `valkey-cli --cluster create --cluster-replicas N` pairs
# primary i with replica i+N using only hostname patterns, and in a K8s
# StatefulSet (where all pods share a hostname prefix) the pairing is
# effectively ordinal-based — primary and replica frequently land in the
# same AZ, defeating the HA guarantee.
#
# Disable only for single-AZ clusters or environments where the bootstrap
# pod cannot be granted the modest list/get RBAC it needs (see
# bootstrap-rbac.yaml).
# -----------------------------------------------------------------------------
topology:
  azAwareBootstrap: true
  # kubectl image for the topology init container. Needs sh + kubectl in
  # $PATH. alpine/k8s is multi-arch (amd64, arm64), small (~50 MB), and
  # ships with /bin/sh + kubectl pre-installed.
  # Avoid `bitnami/kubectl` — Docker Hub no longer serves free Bitnami
  # tags. Avoid `registry.k8s.io/kubectl` and `rancher/kubectl` — both
  # are distroless / no shell.
  kubectlImage: alpine/k8s:1.32.2
