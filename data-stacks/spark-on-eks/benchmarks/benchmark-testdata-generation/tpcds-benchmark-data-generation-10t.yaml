# NOTE: This example requires the following prerequisites before executing the jobs
# 1. Ensure spark-team-a namespace exists
# 2. Ensure r8gd-24xlarge-benchmark NodePool is deployed
# 3. Uses r8gd.24xlarge instances (96 vCPU, 768 GiB RAM, 4x1425GB NVMe RAID0)
#
# Configuration for 10TB TPC-DS data generation:
# - Scale factor: 10000 (10TB)
# - 17 nodes × 3 executors = 51 total executors
# - Each executor: 28 cores, 220GB memory
# - Conservative memory settings to prevent OOM
# - Expected runtime: 2-4 hours depending on S3 throughput

apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: tpcds-data-generation-10tb
  namespace: spark-team-a
spec:
  type: Scala
  mode: cluster
  image: public.ecr.aws/data-on-eks/spark3.5.3-scala2.12-java17-python3-ubuntu-tpcds:v2
  imagePullPolicy: IfNotPresent
  sparkVersion: 4.0.1
  mainClass: com.amazonaws.eks.tpcds.DataGeneration
  mainApplicationFile: local:///opt/spark/examples/jars/eks-spark-benchmark-assembly-1.0.jar
  arguments:
  # TPC-DS data location - 10TB output bucket
  - "s3a://<S3_BUCKET>/TPCDS-TEST-10TB"
  # Path to kit in the docker image
  - "/opt/tpcds-kit/tools"
  # Data Format
  - "parquet"
  # Scale factor (in GB) - 10TB = 10000GB
  - "10000"
  # Generate data num partitions - scaled up proportionally for 10TB
  - "600"
  # Create the partitioned fact tables
  - "true"
  # Shuffle to get partitions coalesced into single files.
  - "true"
  # Logging set to WARN
  - "true"
  sparkConf:
    # Expose Spark metrics for Prometheus
    "spark.ui.prometheus.enabled": "true"
    "spark.executor.processTreeMetrics.enabled": "true"
    "spark.metrics.conf.*.sink.prometheusServlet.class": "org.apache.spark.metrics.sink.PrometheusServlet"
    "spark.metrics.conf.driver.sink.prometheusServlet.path": "/metrics/driver/prometheus/"
    "spark.metrics.conf.executor.sink.prometheusServlet.path": "/metrics/executors/prometheus/"

    # Spark Event logs
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3a://<S3_BUCKET>/spark-event-logs"
    "spark.eventLog.rolling.enabled": "true"
    "spark.eventLog.rolling.maxFileSize": "64m"

    "spark.executorEnv.JAVA_HOME": "/opt/java/openjdk"
    "spark.driverEnv.JAVA_HOME": "/opt/java/openjdk"

    # Extended timeouts for large data generation
    "spark.network.timeout": "3600s"
    "spark.executor.heartbeatInterval": "600s"
    "spark.rpc.askTimeout": "600s"
    "spark.rpc.lookupTimeout": "600s"

    # AQE - Adaptive Query Execution
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.localShuffleReader.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.adaptive.skewJoin.enabled": "true"
    "spark.sql.files.maxRecordsPerFile": "30000000"
    "spark.serializer": "org.apache.spark.serializer.KryoSerializer"

    # S3 Optimizations for large data writes
    "spark.hadoop.fs.s3.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider.mapping": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider=software.amazon.awssdk.auth.credentials.ContainerCredentialsProvider"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "software.amazon.awssdk.auth.credentials.ContainerCredentialsProvider"
    "spark.hadoop.fs.s3a.fast.upload": "true"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.fast.upload.buffer": "disk"
    "spark.hadoop.fs.s3a.buffer.dir": "/data1/s3a"
    "spark.hadoop.fs.s3a.multipart.size": "256M"
    "spark.hadoop.fs.s3a.multipart.threshold": "512M"
    "spark.hadoop.fs.s3a.threads.max": "100"
    "spark.hadoop.fs.s3a.connection.maximum": "400"
    "spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version": "2"

    # Shuffle partitions - scaled for 10TB
    "spark.sql.shuffle.partitions": "6000"
    "spark.kubernetes.executor.podNamePrefix": "tpcds-data-generation-10tb"

    # Shuffle and data writing tuning for large data
    "spark.shuffle.file.buffer": "1m"
    "spark.reducer.maxSizeInFlight": "256m"
    "spark.shuffle.io.maxRetries": "10"
    "spark.shuffle.io.retryWait": "60s"

    # Memory management - conservative settings to prevent OOM
    "spark.memory.fraction": "0.6"
    "spark.memory.storageFraction": "0.3"
    "spark.sql.adaptive.coalescePartitions.minPartitionSize": "64m"

    # GC settings optimized for large heap
    "spark.executor.defaultJavaOptions": "-verbose:gc -XX:+UseG1GC -XX:G1HeapRegionSize=32m -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=500 -XX:+UnlockDiagnosticVMOptions -XX:+G1SummarizeConcMark"
    "spark.driver.defaultJavaOptions": "-XX:+UseG1GC -XX:G1HeapRegionSize=32m"

    # Kubernetes connection timeouts for long-running job
    spark.kubernetes.submission.connectionTimeout: "120000000"
    spark.kubernetes.submission.requestTimeout: "120000000"
    spark.kubernetes.driver.connectionTimeout: "120000000"
    spark.kubernetes.driver.requestTimeout: "120000000"

  restartPolicy:
    type: Never

  batchScheduler: yunikorn
  batchSchedulerOptions:
    queue: root.spark.spark-team-a

  driver:
    labels:
      yunikorn.apache.org/queue: root.spark.spark-team-a
    cores: 7
    memory: "20g"
    memoryOverhead: "8g"
    serviceAccount: spark-team-a
    securityContext:
      runAsUser: 185
    volumeMounts:
    - name: spark-local-dir-1
      mountPath: /data1
    env:
    - name: JAVA_HOME
      value: "/opt/java/openjdk"
    initContainers:
    - name: volume-permission
      image: public.ecr.aws/docker/library/busybox
      command: ['sh', '-c', 'mkdir -p /data1; chown -R 185:185 /data1']
      volumeMounts:
      - name: spark-local-dir-1
        mountPath: /data1
    # Driver on general purpose nodes (no special requirements)
    nodeSelector:
      NodeGroupType: general-purpose
      topology.kubernetes.io/zone: us-west-2a
      karpenter.sh/capacity-type: "on-demand"

  executor:
    labels:
      yunikorn.apache.org/queue: root.spark.spark-team-a
    # r8gd.24xlarge has 96 vCPU - with 3 executors per node: 28 cores each
    # (28 * 3 = 84 cores used, 12 cores for system/kubelet)
    cores: 28
    # Memory allocation for r8gd.24xlarge (768 GiB total, 3 executors per node):
    # - Each executor: 220g memory + 30g overhead = 250g
    # - 3 executors: 750 GiB, leaving ~18 GiB for system/kubelet
    memory: "220g"
    memoryOverhead: "30g"
    instances: 51
    serviceAccount: spark-team-a
    securityContext:
      runAsUser: 185
    volumeMounts:
    - name: spark-local-dir-1
      mountPath: /data1
    initContainers:
    - name: volume-permission
      image: public.ecr.aws/docker/library/busybox
      command: ['sh', '-c', 'mkdir -p /data1; chown -R 185:185 /data1']
      volumeMounts:
      - name: spark-local-dir-1
        mountPath: /data1
    env:
    - name: JAVA_HOME
      value: "/opt/java/openjdk"
    # Target r8gd.24xlarge nodes from the benchmark nodepool
    nodeSelector:
      node.kubernetes.io/workload-type: r8gd-benchmark-24xlarge
      kubernetes.io/arch: arm64
    # Tolerate the nodepool taint
    tolerations:
    - key: benchmark
      operator: Equal
      value: r8gd-24xlarge
      effect: NoSchedule

  volumes:
  - name: spark-local-dir-1
    hostPath:
      path: "/mnt/k8s-disks/0"
      type: DirectoryOrCreate
