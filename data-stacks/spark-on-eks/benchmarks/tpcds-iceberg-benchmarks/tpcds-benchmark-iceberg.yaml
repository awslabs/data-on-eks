# ============================================================
# TPC-DS v4 Benchmark — Native Spark SQL on Iceberg (no Comet)
# Instance: r8gd.12xlarge (Graviton4, 48 vCPU, 384 GB RAM, NVMe)
# Scale: 3 TB   Iterations: 3
#
# Test 2 of 3 — isolates Iceberg benefit vs baseline Parquet (Test 1)
# and Iceberg + Comet (Test 3) so each variable can be measured independently:
#   Test 1: Spark  + Parquet  (tpcds-benchmark-spark.yaml)
#   Test 2: Spark  + Iceberg  (this file)
#   Test 3: Comet  + Iceberg  (tpcds-benchmark-iceberg-comet.yaml)
#
# Compute is identical to Test 1 — only the data source changes.
#
# Prerequisites:
#   1. Iceberg conversion complete (tpcds-parquet-to-iceberg.yaml → COMPLETED)
#   2. Glue DB tpcds_3tb has all 24 TPC-DS tables
#   3. Image: public.ecr.aws/data-on-eks/spark-benchmark:3.5.8-tpcds4
#
# S3 layout:
#   Iceberg warehouse : s3://${S3_BUCKET}/tpcds-iceberg/
#   Iceberg 3TB DB    : s3://${S3_BUCKET}/tpcds-iceberg/tpcds_3tb.db/
#   Results           : s3://${S3_BUCKET}/TPCDS-TEST-3TB-RESULT-ICEBERG-R8G/
#
# Usage:
#   kubectl apply -f tpcds-benchmark-iceberg.yaml
#
# Monitor:
#   kubectl get sparkapplication -n spark-team-a tpcds-benchmark-iceberg -w
#   kubectl logs -n spark-team-a -l spark-role=driver,spark-app-name=tpcds-benchmark-iceberg --tail=50 -f
# ============================================================
---
apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: tpcds-benchmark-iceberg
  namespace: spark-team-a

spec:
  type: Scala
  mode: cluster
  image: "public.ecr.aws/data-on-eks/spark-benchmark:3.5.8-tpcds4"
  imagePullPolicy: Always
  sparkVersion: "3.5.8"
  mainClass: com.k8s.spark.benchmark.BenchmarkSQL
  mainApplicationFile: "local:///opt/spark/jars/spark-k8s-benchmarks-assembly-1.0.0.jar"

  arguments:
    # arg[0] tpcdsDataDir — Iceberg warehouse root (format=iceberg uses icebergDatabase instead)
    - "s3a://${S3_BUCKET}/tpcds-iceberg"
    # arg[1] Results location
    - "s3a://${S3_BUCKET}/TPCDS-TEST-3TB-RESULT-ICEBERG-R8G"
    # arg[2] Path to TPC-DS kit (dsdgen/dsqgen) in the image
    - "/opt/tpcds-kit/tools"
    # arg[3] Data format — triggers Iceberg catalog path in BenchmarkSQL
    - "iceberg"
    # arg[4] Scale factor (GB)
    - "3000"
    # arg[5] Iterations
    - "3"
    # arg[6] optimizeQueries — enables CBO using Iceberg catalog statistics
    - "true"
    # arg[7] Query filter — change to specific queries or leave empty for all 99
    - ""
    # arg[8] Set log level to WARN
    - "true"
    # arg[9] icebergDatabase — Glue catalog.database for USE statement
    - "glue_catalog.tpcds_3tb"

  restartPolicy:
    type: Never

  driver:
    cores: 5
    memory: "20g"
    memoryOverhead: "6g"
    serviceAccount: spark-team-a
    template:
      metadata:
        annotations:
          karpenter.sh/do-not-disrupt: "true"
        labels:
          yunikorn.apache.org/queue: root.spark.spark-team-a
      spec:
        dnsConfig:
          options:
            - name: ndots
              value: "2"
        securityContext:
          runAsUser: 185
        volumes:
          - name: spark-local-dir-1
            hostPath:
              path: "/mnt/k8s-disks/0"
              type: Directory
        initContainers:
          - name: volume-permission
            image: public.ecr.aws/docker/library/busybox
            command: ['sh', '-c', 'mkdir -p /data1; chown -R 185:185 /data1']
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: spark-local-dir-1
                mountPath: /data1
        nodeSelector:
          karpenter.sh/capacity-type: on-demand
          node.kubernetes.io/instance-type: r8gd.12xlarge
        containers:
          - name: spark-kubernetes-driver
            env:
              - name: JAVA_HOME
                value: "/opt/java/openjdk"
            volumeMounts:
              - name: spark-local-dir-1
                mountPath: /data1

  executor:
    cores: 5
    memory: "20g"
    memoryOverhead: "6g"
    instances: 23
    serviceAccount: spark-team-a
    template:
      metadata:
        annotations:
          karpenter.sh/do-not-disrupt: "true"
        labels:
          yunikorn.apache.org/queue: root.spark.spark-team-a
      spec:
        dnsConfig:
          options:
            - name: ndots
              value: "2"
        securityContext:
          runAsUser: 185
        volumes:
          - name: spark-local-dir-1
            hostPath:
              path: "/mnt/k8s-disks/0"
              type: Directory
        initContainers:
          - name: volume-permission
            image: public.ecr.aws/docker/library/busybox
            command: ['sh', '-c', 'mkdir -p /data1; chown -R 185:185 /data1']
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: spark-local-dir-1
                mountPath: /data1
        nodeSelector:
          karpenter.sh/capacity-type: on-demand
          node.kubernetes.io/instance-type: r8gd.12xlarge
        containers:
          - name: spark-kubernetes-executor
            env:
              - name: JAVA_HOME
                value: "/opt/java/openjdk"
            volumeMounts:
              - name: spark-local-dir-1
                mountPath: /data1

  sparkConf:
    # ── Apache Iceberg 1.10.1 + Glue catalog ────────────────────────────────
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    # Primary catalog — glue_catalog.tpcds_3tb.<table>
    "spark.sql.catalog.glue_catalog": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.glue_catalog.catalog-impl": "org.apache.iceberg.aws.glue.GlueCatalog"
    "spark.sql.catalog.glue_catalog.warehouse": "s3a://${S3_BUCKET}/tpcds-iceberg"
    "spark.sql.catalog.glue_catalog.io-impl": "org.apache.iceberg.aws.s3.S3FileIO"
    "spark.sql.catalog.glue_catalog.glue.region": "us-west-2"
    # SparkSessionCatalog v2 bridge — allows DPP to work with default catalog tables
    "spark.sql.catalog.spark_catalog": "org.apache.iceberg.spark.SparkSessionCatalog"
    "spark.sql.catalog.spark_catalog.type": "glue"
    # Use Iceberg catalog statistics for partition pruning (disables HDFS fallback stats)
    "spark.sql.statistics.fallBackToHdfs": "false"

    # ── AQE (Adaptive Query Execution) ──────────────────────────────────────
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.localShuffleReader.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.adaptive.skewJoin.enabled": "true"

    # ── S3A / AWS SDK v2 (EKS Pod Identity) ─────────────────────────────────
    "spark.hadoop.fs.s3a.endpoint.region": "us-west-2"
    "spark.hadoop.fs.s3a.aws.credentials.provider.mapping": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider=software.amazon.awssdk.auth.credentials.ContainerCredentialsProvider"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "software.amazon.awssdk.auth.credentials.ContainerCredentialsProvider"
    "spark.hadoop.fs.s3.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.fast.upload": "true"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.fast.upload.buffer": "disk"
    "spark.hadoop.fs.s3a.buffer.dir": "/data1/s3a"
    "spark.hadoop.fs.s3a.multipart.size": "128M"
    "spark.hadoop.fs.s3a.multipart.threshold": "256M"
    "spark.hadoop.fs.s3a.threads.max": "50"
    "spark.hadoop.fs.s3a.connection.maximum": "200"
    "spark.hadoop.fs.s3a.multipart.purge": "true"
    "spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version": "2"

    # ── Event logs ──────────────────────────────────────────────────────────
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3a://${S3_BUCKET}/spark-event-logs"
    "spark.eventLog.rolling.enabled": "true"
    "spark.eventLog.rolling.maxFileSize": "64m"

    # ── Prometheus metrics ───────────────────────────────────────────────────
    "spark.ui.prometheus.enabled": "true"
    "spark.executor.processTreeMetrics.enabled": "true"
    "spark.metrics.conf.*.sink.prometheusServlet.class": "org.apache.spark.metrics.sink.PrometheusServlet"
    "spark.metrics.conf.driver.sink.prometheusServlet.path": "/metrics/driver/prometheus/"
    "spark.metrics.conf.executor.sink.prometheusServlet.path": "/metrics/executors/prometheus/"

    # ── Stability ────────────────────────────────────────────────────────────
    "spark.network.timeout": "2000s"
    "spark.executor.heartbeatInterval": "300s"
    "spark.kubernetes.submission.connectionTimeout": "120000"
    "spark.kubernetes.submission.requestTimeout": "120000"
    "spark.kubernetes.driver.connectionTimeout": "120000"
    "spark.kubernetes.driver.requestTimeout": "120000"
    "spark.kubernetes.executor.podNamePrefix": "tpcds-benchmark-iceberg"

    # ── Shuffle tuning ───────────────────────────────────────────────────────
    "spark.shuffle.file.buffer": "1m"
    "spark.reducer.maxSizeInFlight": "48m"

    # ── GC ───────────────────────────────────────────────────────────────────
    "spark.executor.defaultJavaOptions": "-verbose:gc -XX:+UseParallelGC -XX:InitiatingHeapOccupancyPercent=70"
