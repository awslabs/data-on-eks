# EMR on EKS Driver Pod Template — PCP Benchmark
#
# Placement strategy: pin driver pods to the PCP benchmark node group.
#
# Do not define a volume mount for spark.local.dir here. EMR on EKS already
# injects the local-dir mount when spark.local.dir is configured, and adding
# the same mount in the pod template causes a duplicate mount-path error.
#
# SOCI: handled automatically by the containerd soci-snapshotter on AL2023 nodes
# when the ECR image has a SOCI index (created on push via ECR enhanced scanning).
apiVersion: v1
kind: Pod
metadata:
  name: emr-driver
  namespace: emr-data-team-a
spec:
  nodeSelector:
    NodeGroupType: EMRPCPBenchmark
    emr-eks-benchmarks: "true"

  containers:
    - name: spark-kubernetes-driver  # Required — do not change
