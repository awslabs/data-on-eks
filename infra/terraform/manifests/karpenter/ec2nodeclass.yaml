apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: streaming-optimized
  namespace: karpenter
spec:
  # Use Amazon Linux 2023 for better performance and security
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest

  # IAM role for Karpenter nodes - from EKS module output
  role: "${KARPENTER_NODE_IAM_ROLE_NAME}"

  # Subnet selection - private secondary subnets
  subnetSelectorTerms:
    - tags:
        Name: "${CLUSTER_NAME}-private-secondary*"

  # Security group selection - use the node security group
  securityGroupSelectorTerms:
    - tags:
        Name: "${CLUSTER_NAME}-node"

  # Instance store optimization - RAID0 handles everything automatically
  instanceStorePolicy: RAID0

  # Block device mappings for additional storage
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        iops: 6000
        throughput: 300
        encrypted: true
        deleteOnTermination: true

  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="//"

    --//
    Content-Type: text/x-shellscript; charset="us-ascii"

    #!/bin/bash

    set -ex

    # NETWORK optimizations for Flink streaming (different from Spark)
    echo 'net.core.rmem_max=134217728' >> /etc/sysctl.conf
    echo 'net.core.wmem_max=134217728' >> /etc/sysctl.conf
    echo 'net.ipv4.tcp_rmem=4096 87380 134217728' >> /etc/sysctl.conf
    echo 'net.ipv4.tcp_wmem=4096 16384 134217728' >> /etc/sysctl.conf
    echo 'net.ipv4.tcp_congestion_control=bbr' >> /etc/sysctl.conf
    echo 'net.core.netdev_max_backlog=30000' >> /etc/sysctl.conf
    echo 'net.ipv4.tcp_slow_start_after_idle=0' >> /etc/sysctl.conf
    sysctl -p

    --//--

  tags:
    stack: flink-on-eks
    Environment: dev
    WorkloadType: streaming
    OptimizedFor: low-latency-networking

