apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: valkey
  namespace: karpenter
spec:
  template:
    metadata:
      labels:
        NodeGroupType: valkey
        workload: valkey

    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: ebs-gp3-1000gi-6000iops-1000tp

      taints:
        - key: workload
          value: valkey
          effect: NoSchedule

      requirements:
        # Capacity type - on-demand only for stateful Valkey workloads
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

        # Architecture - ARM64 only (Graviton)
        - key: kubernetes.io/arch
          operator: In
          values: ["arm64"]

        # Instance families - Graviton memory families r7g/r8g
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["r7g", "r8g"]

        # Instance sizes - large to 8xlarge
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["large", "xlarge", "2xlarge", "4xlarge", "8xlarge"]

        # Nitro system
        - key: karpenter.k8s.aws/instance-hypervisor
          operator: In
          values: ["nitro"]

        # AZ spread - permit any zone, drives topologySpreadConstraints
        - key: topology.kubernetes.io/zone
          operator: Exists

  # Resource limits for the Valkey NodePool
  limits:
    cpu: "1000"
    memory: "4000Gi"

  # Conservative disruption policy for stateful Valkey pods.
  # Never use WhenEmptyOrUnderutilized - rolling consolidation would
  # break gossip stability and force unnecessary BGSAVE fork pressure.
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: "1h"

  # Higher weight than general-purpose pools so Valkey pods land here first
  weight: 50
