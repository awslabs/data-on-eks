# EMR on EKS PCP Benchmark — Single NodePool
#
# Serves all EMR pod types: job runner, Spark driver, and executors.
# Supports both x86 (amd64) and Graviton (arm64) instances.
# No NVMe/instance-store — shuffle goes to the 300 GB gp3 root volume via emptyDir.
#
# Instance families (no 'd' NVMe suffix):
#   x86  : m6i, m7i, m7i-flex, m6a, r6i, r7i, r6a
#   arm64: m6g, m7g, r6g, r7g
# CPU sizes: 32 / 48 / 64 vCPU
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: emr-pcp-benchmark
spec:
  template:
    metadata:
      labels:
        NodeGroupType: EMRPCPBenchmark
        emr-eks-benchmarks: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: emr-pcp-benchmark

      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64", "arm64"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - m6i
            - m7i
            - m7i-flex
            - m6a
            - r6i
            - r7i
            - r6a
            - m6g
            - m7g
            - r6g
            - r7g
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["32", "48", "64"]
        - key: karpenter.k8s.aws/instance-hypervisor
          operator: In
          values: ["nitro"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]

      expireAfter: 24h

  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 300s

  limits:
    cpu: "500000"
    memory: 1000000Gi

  weight: 100
