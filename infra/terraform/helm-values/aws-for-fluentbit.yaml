
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

image:
  tag: 3.1.0

serviceAccount:
  create: true
  name: aws-for-fluent-bit-sa
  annotations:
    eks.amazonaws.com/role-arn: ${fluent_bit_irsa_arn}

service:
  parsersFiles:
    - /fluent-bit/parsers/parsers.conf
%{ if enable_ipv6 ~}
  extraService: |
    ipv6         On
    Flush        5
    HTTP_Server  On
    HTTP_Listen  [::]
    HTTP_PORT    2020
    Health_Check On
%{ else ~}
  extraService: |
    Flush        5
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_PORT    2020
    Health_Check On
%{ endif ~}
  extraParsers: |
    [PARSER]
        Name    kubernetes
        Format  regex
        Regex   ^(?<namespace_name>[^_]+)\.(?<container_name>.+)\.(?<pod_name>[a-z0-9](?:[-a-z0-9]*[a-z0-9])?(?:\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)\.(?<docker_id>[a-z0-9]{64})-$

input:
  name: "tail"
  enabled: true
  tag: "systempods.<namespace_name>.<container_name>.<pod_name>.<docker_id>-"
  path: "/var/log/containers/aws-node*,/var/log/containers/kube-proxy*,/var/log/containers/aws-for-fluent-bit*,/var/log/containers/spark-history-server*,/var/log/containers/spark-operator*,/var/log/containers/*_yunikorn_*"
  db: "/var/log/flb_kube.db"
  memBufLimit: 5MB
  skipLongLines: "On"
  refreshInterval: 10
  extraInputs: |
    multiline.parser  docker, cri
    Tag_Regex         (?<pod_name>[a-z0-9](?:[-a-z0-9]*[a-z0-9])?(?:\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)_(?<namespace_name>[^_]+)_(?<container_name>.+)-(?<docker_id>[a-z0-9]{64})\.log$

# Filtering the Spark job logs by using the namespace in the path `spark-team-`
additionalInputs: |
  [INPUT]
      Name                tail
      Tag                 spark.<namespace_name>.<container_name>.<spark_app_id>-<driver_or_executor>.<docker_id>-
      Path                /var/log/containers/*spark-team-*
      DB                  /var/log/flb_spark.db
      multiline.parser    docker, cri
      Mem_Buf_Limit       5MB
      Skip_Long_Lines     On
      Refresh_Interval    10
      Tag_Regex           (?<spark_app_id>[a-z0-9](?:[-a-z0-9]*[a-z0-9])?(?:\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)-(?<driver_or_executor>(?:driver|exec-[\d]+))_(?<namespace_name>[^_]+)_(?<container_name>.+)-(?<docker_id>[a-z0-9]{64})\.log

filter:
  name: "kubernetes"
  match: "systempods.*"
  kubeURL: "https://kubernetes.default.svc.cluster.local:443"
  mergeLog: "On"
  mergeLogKey: "log_processed"
  keepLog: "On"
  k8sLoggingParser: "On"
  k8sLoggingExclude: "Off"
  bufferSize: "0"
  extraFilters: |
    Kube_Tag_Prefix     systempods.
    Regex_Parser        kubernetes
    Labels              On
    Annotations         Off
    Use_Kubelet         true
    Kubelet_Host        ${enable_ipv6 ? "localhost6" : "localhost"}
    Kubelet_Port        10250
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token

additionalFilters: |
  [FILTER]
      Name                kubernetes
      Match               spark.*
      Kube_URL            https://kubernetes.default.svc.cluster.local:443
      Merge_Log           On
      Merge_Log_Key       log_processed
      Keep_Log            On
      K8S-Logging.Parser  On
      K8S-Logging.Exclude On
      Labels              On
      Buffer_Size         0
      Kube_Tag_Prefix     spark.
      Regex_Parser        kubernetes
      Use_Kubelet         true
      Kubelet_Host        ${enable_ipv6 ? "localhost6" : "localhost"}
      Kubelet_Port        10250
      Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
      Annotations         Off

  # Enriches spark records with Kubernetes metadata and parses the JSON log line.
  # Extracts level/message as top-level columns; remaining fields go into log JSON.
  # Drops non-JSON lines (plain stdout/stderr) by returning -1 when level is absent.
  [FILTER]
      Name                lua
      Match               spark.*
      call                enrich
      code                function enrich(tag, timestamp, record) local k8s = record.kubernetes or {} local labels = k8s.labels or {} local parsed = record.log_processed or {} if type(parsed) == "string" then local ok, obj = pcall(cjson.decode, parsed) if ok then parsed = obj else parsed = {} end end if not parsed.level then return -1, timestamp, record end local explicit = {namespace=true, pod_name=true, container_name=true, node_name=true, app=true, role=true, timestamp=true, level=true, message=true} local log = {} for k,v in pairs(parsed) do if not explicit[k] then log[k] = v end end return 1, timestamp, {namespace=k8s.namespace_name or "", pod_name=k8s.pod_name or "", container_name=k8s.container_name or "", node_name=k8s.host or "", app=labels["spark-app-selector"] or "", role=labels["spark-role"] or "", level=parsed.level, message=parsed.message or "", log=log} end

cloudWatchLogs:
 enabled: false
 match: "systempods.*"
 region: ${region}
 logGroupName: ${cloudwatch_log_group}
 autoCreateGroup: false
 extraOutputs: |
   log_key               log

additionalOutputs: |
  [OUTPUT]
      Name                            s3
      Match                           systempods.*
      region                          ${region}
      bucket                          ${s3_bucket_name}
      total_file_size                 100M
      s3_key_format                   /${cluster_name}/system-pod-logs/$TAG[1]/$TAG[3]/$TAG[2]_%H%M%S_$UUID.log
      s3_key_format_tag_delimiters    ..
      store_dir                       /home/ec2-user/buffer
      upload_timeout                  5m
      log_key                         log

  [OUTPUT]
      Name                http
      Match               spark.*
      Host                ${clickhouse_host}
      Port                ${clickhouse_port}
      URI                 /?query=INSERT+INTO+app_logs.spark+FORMAT+JSONEachRow&input_format_skip_unknown_fields=1&async_insert=1&wait_for_async_insert=0
      Format              json_lines
      http_User           $${CLICKHOUSE_USER}
      http_Passwd         $${CLICKHOUSE_PASSWORD}
      tls                 Off
      Retry_Limit         3

  [OUTPUT]
      Name                            s3
      Match                           spark.*
      region                          ${region}
      bucket                          ${s3_bucket_name}
      total_file_size                 5M
      s3_key_format                   /${cluster_name}/spark-application-logs/$TAG[1]/$TAG[3]/%H%M%S_$UUID.log
      s3_key_format_tag_delimiters    ..
      store_dir                       /home/ec2-user/buffer
      upload_timeout                  5m
      log_key                         log

env:
  - name: CLICKHOUSE_USER
    valueFrom:
      secretKeyRef:
        name: fluent-bit-clickhouse-credentials
        key: username
  - name: CLICKHOUSE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: fluent-bit-clickhouse-credentials
        key: password
